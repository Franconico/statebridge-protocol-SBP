name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "spec/**"
      - "!docs/.gitignore"
      - "!docs/Gemfile.lock"
      - "!.github/workflows/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Prevent any inherited bundler config from excluding gem groups
  BUNDLE_WITHOUT: ""
  BUNDLE_FROZEN: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install gems
        run: |
          cd docs
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3

      - name: Verify jekyll-relative-links is installed
        run: bundle exec ruby -e "require 'jekyll-relative-links'; puts 'OK'"
        working-directory: docs

      - name: Build Jekyll site
        run: |
          cd docs
          bundle exec jekyll build --destination ../_site
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
