name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "spec/**"
      - "!docs/.gitignore"
      - "!docs/Gemfile.lock"
      - "!.github/workflows/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Jekyll and plugins as system gems
        run: |
          sudo gem install \
            jekyll -v "~> 4.3" \
            minima \
            jekyll-seo-tag \
            jekyll-feed \
            jekyll-relative-links \
            jekyll-optional-front-matter \
            jekyll-readme-index \
            jekyll-default-layout \
            --no-document

      - name: Verify jekyll-relative-links is installed
        run: ruby -e "require 'jekyll-relative-links'; puts 'OK'"

      - name: Build Jekyll site
        run: |
          cd docs
          jekyll build --destination ../_site
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
