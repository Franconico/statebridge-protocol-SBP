name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "spec/**"
      - "!docs/.gitignore"
      - "!docs/Gemfile.lock"
      - "!.github/workflows/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ruby gems (no bundler cache)
        run: |
          cd docs
          # Use system Ruby — avoids ruby/setup-ruby's internal bundler cache
          # that restores stale vendor/bundle across runs.
          sudo gem install bundler --no-document
          bundle install --jobs 4 --retry 3 --path /tmp/bundle
        env:
          BUNDLE_WITHOUT: ""
          BUNDLE_FROZEN: "false"

      - name: Verify jekyll-relative-links is installed
        run: bundle exec ruby -e "require 'jekyll-relative-links'; puts 'OK'"
        working-directory: docs
        env:
          BUNDLE_PATH: /tmp/bundle

      - name: Build Jekyll site
        run: |
          cd docs
          bundle exec jekyll build --destination ../_site
        env:
          JEKYLL_ENV: production
          BUNDLE_PATH: /tmp/bundle

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
